<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 320" font-family="system-ui, sans-serif">
  <!-- สารเชิงซ้อน: หาเลขออกซิเดชันของโลหะกลางจากประจุรวม + เลขโคออร์ดิเนชัน = จำนวนลิแกนด์ -->
  <style>
    .lbl { font-size: 12.5px; fill: #1e293b; text-anchor: middle; font-weight: 700; }
    .sub { font-size: 10.5px; fill: #64748b; text-anchor: middle; }
    .given { font-size: 13px; fill: #dc2626; font-weight: 700; text-anchor: middle; }
    .f { font-size: 15px; text-anchor: middle; }
  </style>

  <text x="370" y="24" class="lbl" font-size="14">K₃[Fe(CN)₆] — หาเลขออกซิเดชันของ Fe</text>

  <text x="150" y="80" class="f">3 K⁺</text>
  <text x="150" y="98" class="sub">(นอกวงเล็บ)</text>

  <text x="230" y="75" class="f" font-weight="700">+</text>

  <rect x="270" y="45" width="220" height="55" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="380" y="65" class="f" fill="#2563eb">[Fe(CN)₆]³⁻</text>
  <text x="380" y="90" class="sub">ไอออนเชิงซ้อน (ในวงเล็บ)</text>

  <text x="540" y="75" class="f" font-weight="700">=</text>
  <text x="600" y="80" class="f">เป็นกลาง</text>

  <rect x="120" y="130" width="500" height="70" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="370" y="155" class="given">Fe + 6×(CN⁻ = −1) = −3 (ประจุรวมของ [Fe(CN)₆]³⁻)</text>
  <text x="370" y="178" class="lbl" fill="#0d9488">Fe = −3 − (−6) = +3</text>
  <text x="370" y="193" class="sub">เลขโคออร์ดิเนชัน = จำนวนลิแกนด์ = 6 (นับ CN⁻ ทุกตัว)</text>

  <rect x="60" y="220" width="620" height="80" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="370" y="242" class="lbl" fill="#ea580c" font-size="12">กติกาสำคัญ</text>
  <text x="370" y="262" class="sub">ไอออนนอกวงเล็บ (เช่น K⁺, Cl⁻ ที่ไม่ได้อยู่ใน [ ]) ไม่ใช่ลิแกนด์ ไม่นับเข้าเลขโคออร์ดิเนชัน</text>
  <text x="370" y="280" class="sub">ผลรวมประจุลิแกนด์ + เลขออกซิเดชันโลหะ = ประจุของไอออนเชิงซ้อนทั้งก้อน (ในวงเล็บ)</text>
  <text x="370" y="296" class="sub">ธาตุแทรนซิชันมีเลขออกซิเดชันได้หลายค่า — ต้องคำนวณทีละสาร ห้ามท่องจำค่าตายตัว</text>
</svg>
