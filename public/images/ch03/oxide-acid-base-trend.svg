<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="system-ui, sans-serif">
  <!-- แนวโน้มสมบัติกรด-เบสของออกไซด์ข้ามคาบ 3: เบสล้วน -> แอมโฟเทอริก -> กรดล้วน -->
  <style>
    .lbl { font-size: 13px; fill: #1e293b; text-anchor: middle; font-weight: 700; }
    .sub { font-size: 10px; fill: #64748b; text-anchor: middle; }
    .f { font-size: 13px; text-anchor: middle; font-weight: 700; }
  </style>
  <defs>
    <marker id="oab-ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="380" y="24" class="lbl" font-size="14">แนวโน้มออกไซด์คาบ 3: Na₂O → MgO → Al₂O₃ → SiO₂ → P₄O₁₀ → SO₃ → Cl₂O₇</text>

  <line x1="50" y1="60" x2="710" y2="60" stroke="#94a3b8" stroke-width="2" marker-end="url(#oab-ah)"/>
  <text x="380" y="52" class="sub">ความเป็นโลหะลดลง → อโลหะเพิ่มขึ้น (ข้ามคาบซ้ายไปขวา)</text>

  <!-- โซนเบส -->
  <rect x="50" y="80" width="180" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="105" class="f" fill="#2563eb">Na₂O, MgO</text>
  <text x="140" y="125" class="sub">ออกไซด์เบส</text>
  <text x="140" y="140" class="sub">ทำปฏิกิริยากับกรด</text>

  <!-- โซนแอมโฟเทอริก -->
  <rect x="250" y="80" width="140" height="70" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="320" y="105" class="f" fill="#7c3aed">Al₂O₃</text>
  <text x="320" y="125" class="sub">แอมโฟเทอริก</text>
  <text x="320" y="140" class="sub">ทำได้ทั้งกรด-เบส</text>

  <!-- โซนกรด -->
  <rect x="410" y="80" width="350" height="70" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="585" y="105" class="f" fill="#dc2626">SiO₂, P₄O₁₀, SO₃, Cl₂O₇</text>
  <text x="585" y="125" class="sub">ออกไซด์กรด</text>
  <text x="585" y="140" class="sub">ทำปฏิกิริยากับเบส (ความเป็นกรดเพิ่มขึ้นเรื่อยๆ)</text>

  <line x1="40" y1="175" x2="720" y2="175" stroke="#e2e8f0" stroke-width="1.5"/>

  <text x="380" y="200" class="lbl" font-size="13">ปฏิกิริยากับน้ำ/คลอรีน</text>

  <rect x="60" y="215" width="320" height="80" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="220" y="238" class="sub" font-weight="700" fill="#0d9488">ออกไซด์เบส + น้ำ → เบส (ถ้าละลายได้)</text>
  <text x="220" y="258" class="sub">Na₂O + H₂O → 2NaOH</text>
  <text x="220" y="278" class="sub">โลหะ + Cl₂ → คลอไรด์ไอออนิก (จุดหลอมเหลวสูง)</text>

  <rect x="400" y="215" width="320" height="80" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="560" y="238" class="sub" font-weight="700" fill="#dc2626">ออกไซด์กรด + น้ำ → กรด</text>
  <text x="560" y="258" class="sub">SO₃ + H₂O → H₂SO₄</text>
  <text x="560" y="278" class="sub">อโลหะ + Cl₂ → คลอไรด์โคเวเลนต์ (จุดหลอมเหลวต่ำ ไฮโดรไลซ์ในน้ำ)</text>
</svg>
