<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 340" font-family="system-ui, sans-serif">
  <!-- สมบัติหมู่แฮโลเจน: อำนาจออกซิไดส์ลดลงลงหมู่ (แทนที่ไอออนได้), ความแรงกรด HX เพิ่มขึ้นลงหมู่ (สวนทาง EN) -->
  <style>
    .lbl { font-size: 12.5px; fill: #1e293b; text-anchor: middle; font-weight: 700; }
    .sub { font-size: 10px; fill: #64748b; text-anchor: middle; }
    .f { font-size: 13px; text-anchor: middle; font-weight: 700; }
  </style>
  <defs>
    <marker id="hgp-ah" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="370" y="22" class="lbl" font-size="14">หมู่ VIIA (แฮโลเจน): อำนาจออกซิไดส์ vs ความแรงกรด HX</text>

  <!-- แถวอำนาจออกซิไดส์ -->
  <text x="60" y="60" class="sub" text-anchor="start" font-weight="700">อำนาจออกซิไดส์</text>
  <line x1="220" y1="55" x2="600" y2="55" stroke="#94a3b8" stroke-width="2" marker-end="url(#hgp-ah)"/>
  <text x="220" y="45" class="f" fill="#dc2626">F₂</text>
  <text x="340" y="45" class="f" fill="#ea580c">Cl₂</text>
  <text x="460" y="45" class="f" fill="#f59e0b">Br₂</text>
  <text x="580" y="45" class="f" fill="#65a30d">I₂</text>
  <text x="400" y="72" class="sub">ลดลงลงหมู่ → Cl₂ แทนที่ I⁻ ได้: Cl₂ + 2KI → 2KCl + I₂</text>

  <line x1="40" y1="95" x2="700" y2="95" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- แถวความแรงกรด HX -->
  <text x="60" y="130" class="sub" text-anchor="start" font-weight="700">ความแรงกรด HX</text>
  <line x1="220" y1="125" x2="600" y2="125" stroke="#94a3b8" stroke-width="2" marker-end="url(#hgp-ah)"/>
  <text x="220" y="115" class="f" fill="#65a30d">HF</text>
  <text x="340" y="115" class="f" fill="#f59e0b">HCl</text>
  <text x="460" y="115" class="f" fill="#ea580c">HBr</text>
  <text x="580" y="115" class="f" fill="#dc2626">HI</text>
  <text x="400" y="142" class="sub">เพิ่มขึ้นลงหมู่ (สวนทาง EN!) — พันธะ H-X ยาว/อ่อนลง จึงแตกตัวให้ H⁺ ง่ายขึ้น</text>

  <rect x="60" y="165" width="620" height="55" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="370" y="187" class="sub" font-weight="700" fill="#ea580c">HF เป็นกรดอ่อน แม้ F มี EN สูงสุด — เพราะพันธะ H–F แข็งแรงมาก (มีพันธะไฮโดรเจนด้วย)</text>
  <text x="370" y="205" class="sub">ความแรงกรดตัดสินด้วย "ความง่ายในการแตกพันธะ H–X" ไม่ใช่ความมีขั้วของพันธะ</text>

  <line x1="40" y1="235" x2="700" y2="235" stroke="#e2e8f0" stroke-width="1.5"/>

  <text x="370" y="258" class="lbl" font-size="12">ออกซิเจน: เลขออกซิเดชันเปลี่ยนตามชนิดสารประกอบ</text>
  <text x="180" y="280" class="sub">H₂O: O = −2</text>
  <text x="340" y="280" class="sub">H₂O₂: O = −1</text>
  <text x="500" y="280" class="sub">KO₂: O = −½</text>
  <text x="640" y="280" class="sub" fill="#dc2626" font-weight="700">OF₂: O = +2</text>
  <text x="370" y="300" class="sub">(F มี EN สูงกว่า O เท่านั้น จึงเป็นสารประกอบเดียวที่ O มีเลขออกซิเดชันเป็นบวก)</text>
</svg>
