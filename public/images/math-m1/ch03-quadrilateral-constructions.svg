<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="900" viewBox="0 0 1000 900">
<rect width="1000" height="900" rx="24" fill="#f8fafc"/><style>.h{font:700 25px Arial;fill:#075985}.t{font:17px Arial;fill:#334155}.e{stroke:#0f172a;stroke-width:4;fill:none}.c{stroke:#0ea5e9;stroke-width:3;fill:none;stroke-dasharray:9 7}.r{stroke:#e11d48;stroke-width:4;fill:none}.p{fill:#e11d48}.box{fill:white;stroke:#bae6fd;stroke-width:2}</style>
<text x="35" y="42" class="h">การสร้างรูปสี่เหลี่ยม: รอยสร้างที่ต้องคงไว้</text>
<g transform="translate(30 70)"><rect class="box" width="455" height="370" rx="18"/><text x="20" y="35" class="h">สี่เหลี่ยมผืนผ้า</text><line x1="55" y1="280" x2="375" y2="280" class="e"/><line x1="90" y1="310" x2="90" y2="75" class="c"/><line x1="340" y1="310" x2="340" y2="75" class="c"/><path d="M90 260 L90 125 L340 125 L340 260 Z" class="r"/><path d="M90 240h20v20" class="e"/><path d="M320 260v-20h20" class="e"/><text x="45" y="335" class="t">1 ตั้งฉากที่ A,B  2 คัดลอกความกว้าง</text><text x="45" y="360" class="t">3 เชื่อมปลาย ตรวจด้านตรงข้ามขนาน</text></g>
<g transform="translate(515 70)"><rect class="box" width="455" height="370" rx="18"/><text x="20" y="35" class="h">สี่เหลี่ยมขนมเปียกปูน</text><line x1="55" y1="210" x2="395" y2="210" class="e"/><line x1="225" y1="65" x2="225" y2="340" class="c"/><path d="M55 210 L225 90 L395 210 L225 320 Z" class="r"/><circle cx="225" cy="210" r="5" class="p"/><path d="M225 190h20v20" class="e"/><text x="45" y="335" class="t">1 แบ่งครึ่ง AC  2 ตั้งฉากผ่าน O</text><text x="45" y="360" class="t">3 วาง OB=OD แล้วเชื่อม A-B-C-D</text></g>
<g transform="translate(30 470)"><rect class="box" width="455" height="370" rx="18"/><text x="20" y="35" class="h">สี่เหลี่ยมคางหมู</text><line x1="55" y1="285" x2="395" y2="285" class="e"/><line x1="90" y1="310" x2="90" y2="70" class="c"/><line x1="55" y1="120" x2="395" y2="120" class="c"/><path d="M90 285 L345 285 L285 120 L90 120 Z" class="r"/><path d="M90 265h20v20" class="e"/><text x="45" y="335" class="t">1 สร้างความสูง  2 สร้างเส้นขนานฐาน</text><text x="45" y="360" class="t">3 คัดลอกฐานบน แล้วเชื่อมด้านที่เหลือ</text></g>
<g transform="translate(515 470)"><rect class="box" width="455" height="370" rx="18"/><text x="20" y="35" class="h">รูปว่าว</text><line x1="225" y1="65" x2="225" y2="325" class="e"/><line x1="75" y1="200" x2="375" y2="200" class="c"/><path d="M225 75 L360 200 L225 320 L90 200 Z" class="r"/><circle cx="225" cy="200" r="5" class="p"/><path d="M225 180h20v20" class="e"/><text x="45" y="335" class="t">1 เลือก O บน AC  2 ตั้งฉากผ่าน O</text><text x="45" y="360" class="t">3 วาง OB=OD แล้วเชื่อมจุดตามลำดับ</text></g>
</svg>
