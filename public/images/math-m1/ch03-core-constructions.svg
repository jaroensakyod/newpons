<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700">
<rect width="1000" height="700" rx="24" fill="#f0f9ff"/><style>.h{font:700 23px Arial;fill:#075985}.t{font:16px Arial;fill:#334155}.e{stroke:#0f172a;stroke-width:4;fill:none}.c{stroke:#0ea5e9;stroke-width:3;fill:none;stroke-dasharray:8 6}.r{stroke:#e11d48;stroke-width:4;fill:none}.p{fill:#e11d48}.b{fill:white;stroke:#bae6fd;stroke-width:2}</style>
<text x="35" y="42" class="h">วงเวียน + สันตรง: จุดตัดของส่วนโค้งเป็นหลักฐาน</text>
<g transform="translate(25 70)"><rect class="b" width="300" height="580" rx="16"/><text x="18" y="36" class="h">แบ่งครึ่งส่วนของเส้นตรง</text><line x1="35" y1="260" x2="265" y2="260" class="e"/><path d="M150 122 A180 180 0 0 1 150 398 M150 122 A180 180 0 0 0 150 398" class="c"/><line x1="150" y1="110" x2="150" y2="410" class="r"/><circle cx="35" cy="260" r="5" class="p"/><circle cx="265" cy="260" r="5" class="p"/><text x="30" y="465" class="t">1 ปักที่ A และ B ด้วยรัศมีเดียวกัน</text><text x="30" y="495" class="t">2 ส่วนโค้งตัดเหนือ–ใต้ AB</text><text x="30" y="525" class="t">3 เชื่อมจุดตัดทั้งสอง</text><text x="30" y="555" class="t">ได้เส้นแบ่งครึ่งตั้งฉาก</text></g>
<g transform="translate(350 70)"><rect class="b" width="300" height="580" rx="16"/><text x="18" y="36" class="h">แบ่งครึ่งมุม</text><path d="M40 330 L255 330 M40 330 L235 165" class="e"/><path d="M120 330 A80 80 0 0 0 101 278" class="c"/><circle cx="120" cy="330" r="71" class="c"/><circle cx="101" cy="278" r="71" class="c"/><circle cx="172" cy="282" r="5" class="p"/><line x1="40" y1="330" x2="172" y2="282" class="r"/><text x="30" y="465" class="t">1 ส่วนโค้งจากจุดยอดตัดแขนสองจุด</text><text x="30" y="495" class="t">2 ปักสองจุดด้วยรัศมีเดียวกัน</text><text x="30" y="525" class="t">3 เชื่อมจุดยอดกับจุดตัดใหม่</text><text x="30" y="555" class="t">ได้มุมย่อยเท่ากัน</text></g>
<g transform="translate(675 70)"><rect class="b" width="300" height="580" rx="16"/><text x="18" y="36" class="h">ตั้งฉากผ่านจุดนอกเส้น</text><line x1="35" y1="270" x2="265" y2="270" class="e"/><circle cx="150" cy="120" r="6" class="p"/><path d="M70 270 A170 170 0 0 1 230 270" class="c"/><path d="M150 120 A170 170 0 0 1 150 420 M150 120 A170 170 0 0 0 150 420" class="c"/><line x1="150" y1="120" x2="150" y2="420" class="r"/><circle cx="70" cy="270" r="5" class="p"/><circle cx="230" cy="270" r="5" class="p"/><text x="30" y="470" class="t">1 ศูนย์กลาง P ตัดเส้นที่ A,B</text><text x="30" y="500" class="t">2 ปัก A,B ด้วยรัศมี PA=PB</text><text x="30" y="530" class="t">3 เชื่อมจุดตัดวงกลมทั้งสอง</text><text x="30" y="560" class="t">เส้นที่ได้ผ่าน P และตั้งฉาก</text></g>
</svg>
