<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620"><rect width="1000" height="620" rx="24" fill="#f0f9ff"/><style>.h{font:700 22px Arial;fill:#075985}.t{font:16px Arial;fill:#334155}.e{stroke:#0f172a;stroke-width:4;fill:none}.c{stroke:#0ea5e9;stroke-width:3;fill:none;stroke-dasharray:8 6}.r{stroke:#e11d48;stroke-width:4;fill:none}.p{fill:#e11d48}.b{fill:white;stroke:#bae6fd;stroke-width:2}</style><text x="30" y="40" class="h">สร้างสามเหลี่ยมจากด้านสามด้าน (SSS): ส่วนโค้งต้องมีศูนย์กลางที่ปลายฐาน</text>
<g transform="translate(25 70)"><rect class="b" width="220" height="500" rx="16"/><text x="18" y="36" class="h">1 วาดฐาน</text><line x1="35" y1="285" x2="185" y2="285" class="e"/><circle cx="35" cy="285" r="5" class="p"/><circle cx="185" cy="285" r="5" class="p"/><text x="28" y="315" class="t">A</text><text x="180" y="315" class="t">B</text><text x="22" y="410" class="t">สร้าง AB เท่าด้านแรก</text></g>
<g transform="translate(265 70)"><rect class="b" width="220" height="500" rx="16"/><text x="18" y="36" class="h">2 ปักวงเวียนที่ A</text><line x1="35" y1="285" x2="185" y2="285" class="e"/><path d="M35 120 A165 165 0 0 1 200 285" class="c"/><circle cx="35" cy="285" r="5" class="p"/><text x="22" y="410" class="t">รัศมี = ด้านที่สอง</text><text x="22" y="440" class="t">A เป็นศูนย์กลาง ไม่ใช่</text><text x="22" y="468" class="t">จุดบนส่วนโค้ง</text></g>
<g transform="translate(505 70)"><rect class="b" width="220" height="500" rx="16"/><text x="18" y="36" class="h">3 ปักวงเวียนที่ B</text><line x1="35" y1="285" x2="185" y2="285" class="e"/><path d="M35 120 A165 165 0 0 1 200 285 M20 285 A165 165 0 0 1 185 120" class="c"/><circle cx="110" cy="138" r="6" class="p"/><text x="120" y="135" class="t">C</text><text x="22" y="410" class="t">รัศมี = ด้านที่สาม</text><text x="22" y="440" class="t">ส่วนโค้งทั้งสองตัดที่ C</text></g>
<g transform="translate(745 70)"><rect class="b" width="230" height="500" rx="16"/><text x="18" y="36" class="h">4 เชื่อมและตรวจ</text><path d="M35 285 L110 138 L185 285 Z" class="r"/><path d="M35 120 A165 165 0 0 1 200 285 M20 285 A165 165 0 0 1 185 120" class="c"/><circle cx="35" cy="285" r="5" class="p"/><circle cx="185" cy="285" r="5" class="p"/><circle cx="110" cy="138" r="5" class="p"/><text x="22" y="410" class="t">เชื่อม AC และ BC</text><text x="22" y="440" class="t">ตรวจ AB, AC, BC ด้วย</text><text x="22" y="468" class="t">ความกว้างวงเวียนเดิม</text></g></svg>
