<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><rect width="1000" height="560" rx="24" fill="#f0f9ff"/><style>.h{font:700 22px Arial;fill:#075985}.t{font:16px Arial;fill:#334155}.e{stroke:#0f172a;stroke-width:4;fill:none}.r{stroke:#e11d48;stroke-width:4;fill:none}.c{stroke:#0ea5e9;stroke-width:3;fill:none;stroke-dasharray:8 6}.b{fill:white;stroke:#bae6fd;stroke-width:2}</style><text x="30" y="40" class="h">เลือกข้อมูลให้ตรงวิธีสร้าง</text>
<g transform="translate(25 70)"><rect class="b" width="300" height="450" rx="16"/><text x="18" y="35" class="h">มุมมาตรฐาน</text><line x1="45" y1="300" x2="255" y2="300" class="e"/><line x1="45" y1="300" x2="150" y2="118" class="r"/><line x1="45" y1="300" x2="45" y2="95" class="c"/><line x1="45" y1="300" x2="215" y2="130" class="c"/><text x="60" y="270" class="t">60° → แบ่งครึ่งเป็น 30°</text><text x="60" y="330" class="t">90° → แบ่งครึ่งเป็น 45°</text><text x="35" y="400" class="t">ประกอบ/หักมุมจากรังสีเดียวกัน</text></g>
<g transform="translate(350 70)"><rect class="b" width="300" height="450" rx="16"/><text x="18" y="35" class="h">SAS</text><path d="M45 320 L250 320 L155 105 Z" class="r"/><path d="M95 320 A50 50 0 0 0 72 278" class="c"/><text x="45" y="375" class="t">สร้างมุมระหว่างด้านก่อน</text><text x="45" y="405" class="t">แล้วคัดลอกด้านสองด้านบนแขน</text></g>
