<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="system-ui, sans-serif">
  <!-- 4 แนวปฏิบัติความปลอดภัยในห้องแล็บ: ทิศทางให้ความร้อน / การดมกลิ่น (wafting) / ทิ้งของเสีย / ปรอทหก -->
  <style>
    .lbl { font-size: 13px; fill: #1e293b; text-anchor: middle; font-weight: 700; }
    .sub { font-size: 10.5px; fill: #64748b; text-anchor: middle; }
    .ok { font-size: 15px; fill: #059669; font-weight: 700; }
    .no { font-size: 15px; fill: #dc2626; font-weight: 700; }
  </style>
  <defs>
    <marker id="lsp-g" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#059669"/>
    </marker>
    <marker id="lsp-r" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#dc2626"/>
    </marker>
  </defs>

  <line x1="450" y1="20" x2="450" y2="460" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="20" y1="240" x2="880" y2="240" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- panel 1: ทิศทางหลอดทดลองตอนให้ความร้อน -->
  <text x="225" y="35" class="lbl">ให้ความร้อนในหลอดทดลอง</text>
  <g transform="translate(225,140) rotate(-25)">
    <rect x="-10" y="-70" width="20" height="90" rx="8" fill="#f0f9ff" stroke="#94a3b8" stroke-width="2"/>
    <path d="M-8,10 Q0,25 8,10 L8,20 Q0,32 -8,20 Z" fill="#bfdbfe"/>
  </g>
  <path d="M197,196 l-10,14 l14,-4 z" fill="#f59e0b"/>
  <line x1="200" y1="210" x2="200" y2="225" stroke="#f59e0b" stroke-width="3"/>
  <circle cx="130" cy="90" r="16" fill="none" stroke="#059669" stroke-width="2"/>
  <circle cx="126" cy="87" r="2" fill="#059669"/><circle cx="134" cy="87" r="2" fill="#059669"/>
  <path d="M124,95 Q130,99 136,95" stroke="#059669" stroke-width="1.5" fill="none"/>
  <line x1="160" y1="100" x2="118" y2="95" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="130" y="130" class="ok" text-anchor="middle">✓</text>
  <text x="225" y="210" class="sub">หันปากหลอดออกจากตัวเองและผู้อื่นเสมอ (กัน bumping กระเด็นถูกคน)</text>

  <!-- panel 2: การดมกลิ่นสาร (wafting) -->
  <text x="675" y="35" class="lbl">การทดสอบกลิ่นสาร (wafting)</text>
  <path d="M640,110 L660,110 L657,140 Q650,146 643,140 Z" fill="#f0f9ff" stroke="#94a3b8" stroke-width="2"/>
  <path d="M643,120 Q650,124 657,120" stroke="#94a3b8" stroke-width="1.2" fill="none"/>
  <path d="M660,110 q10,-8 18,-2 M660,120 q12,-6 20,2 M660,130 q10,-4 16,4" stroke="#94a3b8" stroke-width="1.3" fill="none" stroke-dasharray="2 3"/>
  <path d="M710,95 q14,8 8,24 q-4,10 -16,10" fill="none" stroke="#1e293b" stroke-width="2.5"/>
  <circle cx="770" cy="120" r="15" fill="none" stroke="#059669" stroke-width="2"/>
  <path d="M775,115 q6,5 0,11" stroke="#059669" stroke-width="1.8" fill="none"/>
  <text x="770" y="150" class="ok" text-anchor="middle">✓</text>
  <text x="675" y="210" class="sub">ใช้มือโบกไอสารเข้าหาจมูกจากระยะห่าง ห้ามดมจากปากภาชนะโดยตรง</text>

  <!-- panel 3: ทิ้งของเสียให้ถูกภาชนะ -->
  <text x="225" y="275" class="lbl">การทิ้งของเสียเคมี</text>
  <rect x="155" y="330" width="60" height="65" rx="4" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5"/>
  <rect x="155" y="330" width="60" height="16" fill="#ea580c"/>
  <text x="185" y="341" class="sub" fill="#fff" font-size="8.5" font-weight="700">ของเสีย</text>
  <text x="185" y="415" class="ok" text-anchor="middle">✓</text>
  <rect x="280" y="335" width="55" height="60" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <line x1="280" y1="335" x2="335" y2="395" stroke="#dc2626" stroke-width="3"/>
  <line x1="335" y1="335" x2="280" y2="395" stroke="#dc2626" stroke-width="3"/>
  <text x="307" y="415" class="no" text-anchor="middle">✗</text>
  <text x="225" y="450" class="sub">ทิ้งภาชนะของเสียอันตรายที่จัดแยกไว้เสมอ — ห้ามทิ้งถังขยะทั่วไปหรือเทลงอ่างน้ำ</text>

  <!-- panel 4: ปรอทหก -->
  <text x="675" y="275" class="lbl">ปรอทหก (mercury spill)</text>
  <g transform="translate(560,365)">
    <line x1="0" y1="-25" x2="0" y2="20" stroke="#94a3b8" stroke-width="3"/>
    <path d="M-14,20 Q0,32 14,20" fill="none" stroke="#94a3b8" stroke-width="3"/>
    <line x1="-16" y1="-2" x2="16" y2="26" stroke="#dc2626" stroke-width="3"/>
    <line x1="16" y1="-2" x2="-16" y2="26" stroke="#dc2626" stroke-width="3"/>
  </g>
  <text x="560" y="415" class="no" text-anchor="middle" font-size="10">ห้ามไม้กวาด</text>
  <g transform="translate(700,365)">
    <rect x="-14" y="-20" width="28" height="30" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2.5"/>
    <rect x="-6" y="-28" width="12" height="10" fill="#94a3b8"/>
    <line x1="-16" y1="-25" x2="16" y2="15" stroke="#dc2626" stroke-width="3"/>
    <line x1="16" y1="-25" x2="-16" y2="15" stroke="#dc2626" stroke-width="3"/>
  </g>
  <text x="700" y="415" class="no" text-anchor="middle" font-size="10">ห้ามดูดฝุ่น</text>
  <rect x="815" y="345" width="50" height="38" rx="5" fill="#f0fdfa" stroke="#059669" stroke-width="2.5"/>
  <text x="840" y="368" class="sub" fill="#059669" font-size="8" font-weight="700">Hg kit</text>
  <text x="840" y="415" class="ok" text-anchor="middle">✓</text>
  <text x="675" y="450" class="sub" font-size="9.5">ห้ามไม้กวาด/เครื่องดูดฝุ่น/มือเปล่า — ใช้ชุดเก็บปรอทเฉพาะและระบายอากาศ</text>
</svg>
