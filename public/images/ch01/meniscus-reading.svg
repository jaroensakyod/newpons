<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="system-ui, sans-serif">
  <!-- การอ่านเมนิสคัส: อ่านที่จุดต่ำสุดของผิวโค้งเว้า และสายตาต้องอยู่ระดับเดียวกับผิวของเหลว -->
  <style>
    .lbl { font-size: 12.5px; fill: #1e293b; text-anchor: middle; }
    .sub { font-size: 11px; fill: #64748b; text-anchor: middle; }
    .tick { stroke: #64748b; stroke-width: 1.2; }
  </style>
  <defs>
    <marker id="ah-green" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#10b981"/>
    </marker>
    <marker id="ah-slate" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- หลอดแก้ว -->
  <rect x="430" y="50" width="64" height="300" fill="#f0f9ff" stroke="#94a3b8" stroke-width="2.5"/>
  <!-- ของเหลว + เมนิสคัสโค้งเว้า (ขอบสูง กลางต่ำสุด) -->
  <path d="M432,208 Q462,224 492,208 L492,348 L432,348 Z" fill="#bfdbfe"/>
  <path d="M432,208 Q462,224 492,208" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <!-- ขีดสเกลบนหลอด -->
  <line x1="430" y1="100" x2="442" y2="100" class="tick"/>
  <line x1="430" y1="140" x2="442" y2="140" class="tick"/>
  <line x1="430" y1="180" x2="442" y2="180" class="tick"/>
  <line x1="424" y1="216" x2="446" y2="216" stroke="#10b981" stroke-width="2"/>
  <line x1="430" y1="256" x2="442" y2="256" class="tick"/>
  <line x1="430" y1="296" x2="442" y2="296" class="tick"/>

  <!-- ลูกศรชี้จุดต่ำสุดของเมนิสคัส -->
  <line x1="565" y1="152" x2="472" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#ah-slate)"/>
  <text x="580" y="132" class="lbl">อ่านที่จุดต่ำสุด</text>
  <text x="580" y="147" class="lbl">ของเมนิสคัส</text>

  <!-- ตา 1: สูงเกินไป -->
  <ellipse cx="140" cy="120" rx="22" ry="12" fill="#fff" stroke="#b91c1c" stroke-width="2"/>
  <circle cx="140" cy="120" r="5" fill="#b91c1c"/>
  <line x1="162" y1="122" x2="458" y2="212" stroke="#ef4444" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="180" y="98" class="lbl" fill="#b91c1c" text-anchor="start">สูงไป → อ่านได้ค่าผิด (parallax error)</text>

  <!-- ตา 2: ตรงระดับผิวของเหลว (ถูกต้อง) -->
  <ellipse cx="140" cy="216" rx="22" ry="12" fill="#fff" stroke="#047857" stroke-width="2"/>
  <circle cx="140" cy="216" r="5" fill="#047857"/>
  <line x1="162" y1="216" x2="452" y2="216" stroke="#10b981" stroke-width="2.5" marker-end="url(#ah-green)"/>
  <text x="180" y="238" class="lbl" fill="#047857" text-anchor="start">ตรงระดับเมนิสคัส → ถูกต้อง</text>

  <!-- ตา 3: ต่ำเกินไป -->
  <ellipse cx="140" cy="312" rx="22" ry="12" fill="#fff" stroke="#b45309" stroke-width="2"/>
  <circle cx="140" cy="312" r="5" fill="#b45309"/>
  <line x1="162" y1="310" x2="458" y2="220" stroke="#f59e0b" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="180" y="340" class="lbl" fill="#b45309" text-anchor="start">ต่ำไป → อ่านได้ค่าผิด (parallax error)</text>

  <text x="350" y="386" class="sub">ของเหลวส่วนใหญ่ผิวโค้งเว้า → อ่านจุดต่ำสุด โดยสายตาอยู่ระดับเดียวกับผิวของเหลว (ยกเว้นปรอทโค้งนูน อ่านจุดสูงสุด)</text>
</svg>
