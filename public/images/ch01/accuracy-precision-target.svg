<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 525" font-family="system-ui, sans-serif">
  <!-- ความแม่น (accuracy) vs ความเที่ยง (precision) แบบเป้ายิง 4 กรณี -->
  <style>
    .lbl { font-size: 13px; fill: #1e293b; text-anchor: middle; font-weight: 700; }
    .sub { font-size: 11.5px; fill: #64748b; text-anchor: middle; }
    .yes { font-size: 11.5px; fill: #059669; text-anchor: middle; font-weight: 700; }
    .no { font-size: 11.5px; fill: #dc2626; text-anchor: middle; font-weight: 700; }
  </style>

  <!-- (1) แม่นสูง + เที่ยงสูง: บนซ้าย -->
  <g transform="translate(150,140)">
    <circle r="90" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <circle r="60" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle r="30" fill="#fecaca" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle r="6" fill="#dc2626"/>
    <circle cx="4" cy="-3" r="5" fill="#1e293b"/>
    <circle cx="-3" cy="5" r="5" fill="#1e293b"/>
    <circle cx="2" cy="6" r="5" fill="#1e293b"/>
    <circle cx="-4" cy="-4" r="5" fill="#1e293b"/>
  </g>
  <text x="150" y="255" class="lbl">แม่นสูง + เที่ยงสูง</text>
  <text x="150" y="272" class="yes">accuracy ✓ precision ✓</text>
  <text x="150" y="288" class="sub">จุดกระจุกตัวและอยู่กลางเป้า</text>

  <!-- (2) แม่นสูง + เที่ยงต่ำ: บนขวา -->
  <g transform="translate(490,140)">
    <circle r="90" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <circle r="60" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle r="30" fill="#fecaca" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle r="6" fill="#dc2626"/>
    <circle cx="40" cy="-30" r="5" fill="#1e293b"/>
    <circle cx="-45" cy="20" r="5" fill="#1e293b"/>
    <circle cx="10" cy="50" r="5" fill="#1e293b"/>
    <circle cx="-30" cy="-45" r="5" fill="#1e293b"/>
  </g>
  <text x="490" y="255" class="lbl">แม่นสูง + เที่ยงต่ำ</text>
  <text x="490" y="272" class="yes">accuracy ✓</text>
  <text x="490" y="288" class="no">precision ✗</text>
  <text x="490" y="304" class="sub">จุดกระจายรอบกลางเป้า (เฉลี่ยใกล้กลาง)</text>

  <!-- (3) แม่นต่ำ + เที่ยงสูง: ล่างซ้าย -->
  <g transform="translate(150,390)">
    <circle r="90" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <circle r="60" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle r="30" fill="#fecaca" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle r="6" fill="#dc2626"/>
    <circle cx="58" cy="-52" r="5" fill="#1e293b"/>
    <circle cx="64" cy="-46" r="5" fill="#1e293b"/>
    <circle cx="61" cy="-58" r="5" fill="#1e293b"/>
    <circle cx="55" cy="-44" r="5" fill="#1e293b"/>
  </g>
  <text x="150" y="450" class="lbl">แม่นต่ำ + เที่ยงสูง</text>
  <text x="150" y="468" class="no">accuracy ✗</text>
  <text x="150" y="486" class="yes">precision ✓</text>
  <text x="150" y="504" class="sub">จุดกระจุกตัวแน่น แต่ห่างจากกลางเป้า</text>

  <!-- (4) แม่นต่ำ + เที่ยงต่ำ: ล่างขวา -->
  <g transform="translate(490,390)">
    <circle r="90" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <circle r="60" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle r="30" fill="#fecaca" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle r="6" fill="#dc2626"/>
    <circle cx="55" cy="-50" r="5" fill="#1e293b"/>
    <circle cx="-50" cy="40" r="5" fill="#1e293b"/>
    <circle cx="20" cy="-60" r="5" fill="#1e293b"/>
    <circle cx="-30" cy="15" r="5" fill="#1e293b"/>
  </g>
  <text x="490" y="450" class="lbl">แม่นต่ำ + เที่ยงต่ำ</text>
  <text x="490" y="466" class="no">accuracy ✗ precision ✗</text>
  <text x="490" y="482" class="sub">จุดกระจายทั้งตำแหน่งและระยะห่างจากกลางเป้า</text>
</svg>
