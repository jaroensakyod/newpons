<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="system-ui, sans-serif">
  <!-- ปริมาตรที่ใช้ในการไทเทรต = ค่าอ่านสุดท้าย - ค่าอ่านเริ่มต้น (บิวเรตสเกล 0 อยู่บน)
       สเกลเชิงเส้น: y = 40 + mL * 5.6 (0 mL ที่ y=40, 50 mL ที่ y=320) -->
  <style>
    .lbl { font-size: 12.5px; fill: #1e293b; text-anchor: middle; }
    .sub { font-size: 11px; fill: #64748b; text-anchor: middle; }
    .tick { stroke: #64748b; stroke-width: 1.2; }
    .given { font-size: 13px; fill: #dc2626; font-weight: 700; text-anchor: start; }
  </style>
  <defs>
    <marker id="brd-ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- หลอดบิวเรต (สเกล 0 บน 50 ล่าง) -->
  <rect x="230" y="30" width="30" height="300" fill="#f0f9ff" stroke="#94a3b8" stroke-width="2"/>
  <!-- ของเหลวจากระดับเริ่มต้น (0.45 mL, y=42.5) ถึงก๊อก -->
  <rect x="233" y="42.5" width="24" height="272.5" fill="#bfdbfe"/>

  <!-- ขีดสเกลอ้างอิง (เชิงเส้นทุก 10 mL) -->
  <line x1="230" y1="40" x2="242" y2="40" class="tick"/><text x="222" y="43" class="sub" text-anchor="end">0</text>
  <line x1="230" y1="96" x2="242" y2="96" class="tick"/><text x="222" y="99" class="sub" text-anchor="end">10</text>
  <line x1="230" y1="152" x2="242" y2="152" class="tick"/><text x="222" y="155" class="sub" text-anchor="end">20</text>
  <line x1="230" y1="208" x2="242" y2="208" class="tick"/><text x="222" y="211" class="sub" text-anchor="end">30</text>
  <line x1="230" y1="264" x2="242" y2="264" class="tick"/><text x="222" y="267" class="sub" text-anchor="end">40</text>
  <line x1="230" y1="320" x2="242" y2="320" class="tick"/><text x="222" y="323" class="sub" text-anchor="end">50</text>

  <!-- ก๊อกด้านล่าง -->
  <rect x="238" y="330" width="14" height="16" fill="#f0f9ff" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="222" y="346" width="46" height="9" rx="3" fill="#f59e0b"/>

  <!-- เมนิสคัสเริ่มต้น 0.45 mL → y = 40 + 0.45×5.6 = 42.5 -->
  <path d="M233,42.5 Q245,49.5 257,42.5" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <line x1="257" y1="42.5" x2="330" y2="42.5" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="336" y="46.5" class="given">ค่าอ่านเริ่มต้น = 0.45 mL</text>

  <!-- เมนิสคัสสุดท้าย 24.85 mL → y = 40 + 24.85×5.6 = 179.2 -->
  <path d="M233,179.2 Q245,186.2 257,179.2" fill="none" stroke="#1d4ed8" stroke-width="2.5"/>
  <line x1="257" y1="179.2" x2="330" y2="179.2" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="336" y="183.2" class="given">ค่าอ่านสุดท้าย = 24.85 mL</text>

  <!-- วงเล็บช่วงที่ใช้ไป -->
  <path d="M400,46.5 C420,46.5 420,175.2 400,175.2" fill="none" stroke="#dc2626" stroke-width="2"/>
  <text x="430" y="100" class="lbl" fill="#dc2626" text-anchor="start">ปริมาตรที่ใช้</text>
  <text x="430" y="118" class="lbl" fill="#dc2626" text-anchor="start">= 24.85 − 0.45</text>
  <text x="430" y="136" class="lbl" fill="#dc2626" text-anchor="start">= 24.40 mL</text>

  <text x="350" y="368" class="sub">ทั้งสองค่าอ่านละเอียดถึง 0.01 mL (ทศนิยม 2 ตำแหน่ง) → ผลลบต้องรายงานทศนิยม 2 ตำแหน่งเช่นกัน</text>
</svg>
