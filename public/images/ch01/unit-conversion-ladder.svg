<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" font-family="system-ui, sans-serif">
  <!-- บันไดหน่วยปริมาตร: μL → mL → L แต่ละขั้นต่างกัน 1000 เท่า -->
  <style>
    .lbl { font-size: 14px; fill: #1e293b; text-anchor: middle; font-weight: 700; }
    .sub { font-size: 11px; fill: #64748b; text-anchor: middle; }
    .factor { font-size: 12px; fill: #7c3aed; text-anchor: middle; font-weight: 700; }
    .given { font-size: 13px; fill: #dc2626; font-weight: 700; text-anchor: middle; }
  </style>
  <defs>
    <marker id="ucl-down" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#0d9488"/>
    </marker>
    <marker id="ucl-up" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- กล่อง μL -->
  <rect x="40" y="70" width="130" height="60" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="105" y="105" class="lbl" fill="#dc2626">μL (ไมโครลิตร)</text>

  <!-- กล่อง mL -->
  <rect x="285" y="70" width="130" height="60" rx="10" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="350" y="105" class="lbl" fill="#0d9488">mL (มิลลิลิตร)</text>

  <!-- กล่อง L -->
  <rect x="530" y="70" width="130" height="60" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="595" y="105" class="lbl" fill="#2563eb">L (ลิตร)</text>

  <!-- ลูกศรลง (หารด้วย 1000 ทุกครั้ง ไปหน่วยใหญ่ขึ้น) -->
  <line x1="172" y1="85" x2="283" y2="85" stroke="#0d9488" stroke-width="2.5" marker-end="url(#ucl-down)"/>
  <text x="228" y="72" class="factor">÷ 1000</text>
  <line x1="417" y1="85" x2="528" y2="85" stroke="#0d9488" stroke-width="2.5" marker-end="url(#ucl-down)"/>
  <text x="472" y="72" class="factor">÷ 1000</text>

  <!-- ลูกศรขึ้น (คูณ 1000 ทุกครั้ง ไปหน่วยเล็กลง) -->
  <line x1="283" y1="118" x2="172" y2="118" stroke="#94a3b8" stroke-width="2" marker-end="url(#ucl-up)"/>
  <text x="228" y="140" class="sub">× 1000</text>
  <line x1="528" y1="118" x2="417" y2="118" stroke="#94a3b8" stroke-width="2" marker-end="url(#ucl-up)"/>
  <text x="472" y="140" class="sub">× 1000</text>

  <!-- ตัวอย่างคำนวณ: 250 μL หารด้วย 1000 = 0.250 mL -->
  <text x="105" y="178" class="given">250 μL</text>
  <line x1="175" y1="172" x2="290" y2="172" stroke="#dc2626" stroke-width="2" marker-end="url(#ucl-down)"/>
  <text x="232" y="162" class="factor" fill="#dc2626">÷ 1000</text>
  <text x="350" y="178" class="given">= 0.250 mL</text>

  <text x="350" y="252" class="sub">1 mL = 1000 μL → หารตัวเลขด้วย 1000 เมื่อเปลี่ยนจากหน่วยเล็กไปหน่วยใหญ่กว่า 1 ระดับ</text>
</svg>
