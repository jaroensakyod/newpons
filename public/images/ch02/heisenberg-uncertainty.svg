<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" font-family="system-ui, sans-serif">
  <!-- หลักความไม่แน่นอน: Δx·Δp ≥ h/4π — ยิ่งกักบริเวณแคบ (Δx เล็ก) ยิ่งไม่แน่นอนของความเร็วสูง -->
  <style>
    .lbl { font-size: 12.5px; fill: #1e293b; text-anchor: middle; font-weight: 700; }
    .sub { font-size: 10.5px; fill: #64748b; text-anchor: middle; }
    .given { font-size: 12px; fill: #dc2626; font-weight: 700; text-anchor: middle; }
    .ok { fill: #059669; font-weight: 700; }
    .no { fill: #dc2626; font-weight: 700; }
  </style>

  <rect x="60" y="20" width="660" height="46" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="2.5"/>
  <text x="390" y="48" class="lbl" fill="#0d9488" font-size="15">Δx · Δp ≥ h / (4π)  →  Δv_min = h / (4π · Δx · mₑ)</text>

  <line x1="390" y1="80" x2="390" y2="320" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ซ้าย: กักในขนาดออร์บิทัลอะตอม -->
  <text x="195" y="100" class="lbl">กักในขนาดอะตอม (Δx = 5×10⁻¹¹ m)</text>
  <circle cx="195" cy="180" r="55" fill="none" stroke="#0d9488" stroke-width="2" stroke-dasharray="5 3"/>
  <circle cx="195" cy="180" r="4" fill="#0d9488"/>
  <text x="195" y="250" class="given">Δv_min ≈ 1.16×10⁶ m/s</text>
  <text x="195" y="268" class="sub">≈ 0.004 เท่าของ c</text>
  <text x="195" y="290" class="ok" text-anchor="middle">น้อยกว่า c มาก → เป็นไปได้ ✓</text>
  <text x="195" y="308" class="sub">อิเล็กตรอนอยู่ในอะตอมได้จริง</text>

  <!-- ขวา: กักในขนาดนิวเคลียส -->
  <text x="585" y="100" class="lbl">กักในขนาดนิวเคลียส (Δx = 1×10⁻¹⁴ m)</text>
  <circle cx="585" cy="180" r="10" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="3 2"/>
  <circle cx="585" cy="180" r="3" fill="#dc2626"/>
  <text x="585" y="250" class="given">Δv_min ≈ 5.79×10⁹ m/s</text>
  <text x="585" y="268" class="sub">≈ 19.3 เท่าของ c</text>
  <text x="585" y="290" class="no" text-anchor="middle">เกินอัตราเร็วแสง → เป็นไปไม่ได้ ✗</text>
  <text x="585" y="308" class="sub">อิเล็กตรอนอยู่ในนิวเคลียสไม่ได้</text>
</svg>
