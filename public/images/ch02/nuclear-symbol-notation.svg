<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="system-ui, sans-serif">
  <!-- อ่านสัญลักษณ์นิวเคลียร์: เลขมวล (A) เลขอะตอม (Z) ประจุไอออน และนิยาม isotope/isotone/isobar -->
  <style>
    .lbl { font-size: 13px; fill: #1e293b; text-anchor: middle; font-weight: 700; }
    .sub { font-size: 11px; fill: #64748b; text-anchor: middle; }
    .big { font-size: 44px; fill: #1e293b; font-weight: 700; }
    .sup { font-size: 20px; font-weight: 700; }
    .info { fill: #2563eb; }
    .check { fill: #0d9488; }
    .warn { fill: #dc2626; }
  </style>
  <defs>
    <marker id="nsn-ah" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- สัญลักษณ์หลัก -->
  <text x="230" y="140" class="sup info" text-anchor="end">A</text>
  <text x="230" y="185" class="sup check" text-anchor="end">Z</text>
  <text x="260" y="165" class="big">X</text>
  <text x="330" y="120" class="sup warn">n+</text>

  <!-- เส้นชี้ + คำอธิบาย -->
  <line x1="225" y1="130" x2="140" y2="80" stroke="#2563eb" stroke-width="1.5" marker-end="url(#nsn-ah)"/>
  <text x="60" y="70" class="lbl info" text-anchor="start">A = เลขมวล</text>
  <text x="60" y="88" class="sub" text-anchor="start">(โปรตอน + นิวตรอน)</text>

  <line x1="225" y1="178" x2="140" y2="230" stroke="#0d9488" stroke-width="1.5" marker-end="url(#nsn-ah)"/>
  <text x="60" y="245" class="lbl check" text-anchor="start">Z = เลขอะตอม</text>
  <text x="60" y="263" class="sub" text-anchor="start">(จำนวนโปรตอน)</text>

  <line x1="325" y1="115" x2="420" y2="70" stroke="#dc2626" stroke-width="1.5" marker-end="url(#nsn-ah)"/>
  <text x="430" y="60" class="lbl warn" text-anchor="start">ประจุไอออน</text>
  <text x="430" y="78" class="sub" text-anchor="start">(ถ้ามี — ไม่ใช่ทุกอะตอม)</text>

  <rect x="470" y="130" width="250" height="50" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="595" y="151" class="lbl check">นิวตรอน = A − Z</text>
  <text x="595" y="169" class="sub">(สำหรับไอออน: โปรตอน ≠ อิเล็กตรอน)</text>

  <line x1="600" y1="200" x2="600" y2="220" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="470" y="220" width="250" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="595" y="240" class="lbl info">ไอออนลบ = รับ e⁻ เพิ่ม</text>
  <text x="595" y="258" class="sub">อิเล็กตรอน = Z + |ประจุลบ|</text>
  <text x="595" y="276" class="sub">ไอออนบวก = เสีย e⁻ ออก → e⁻ = Z − ประจุบวก</text>

  <!-- ตารางนิยาม 3 ศัพท์ -->
  <rect x="40" y="300" width="220" height="34" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="150" y="322" class="lbl" fill="#ea580c">ไอโซโทป: p (Z) เท่ากัน</text>

  <rect x="270" y="300" width="220" height="34" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="380" y="322" class="lbl warn">ไอโซโทน: n เท่ากัน</text>

  <rect x="500" y="300" width="220" height="34" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="610" y="322" class="lbl" fill="#7c3aed">ไอโซบาร์: A เท่ากัน</text>
</svg>
