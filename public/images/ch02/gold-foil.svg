<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="system-ui, sans-serif">
  <!-- การทดลองแผ่นทองคำของรัทเทอร์ฟอร์ด -->
  <style>
    .lbl { font-size: 12.5px; fill: #1e293b; text-anchor: middle; }
    .sub { font-size: 11px; fill: #64748b; text-anchor: middle; }
    .alpha { stroke: #dc2626; stroke-width: 2.5; fill: none; marker-end: url(#ra); }
  </style>
  <defs>
    <marker id="ra" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- แหล่งกำเนิดแอลฟา -->
  <rect x="60" y="128" width="70" height="44" rx="8" fill="#334155"/>
  <text x="95" y="118" class="lbl">แหล่งกำเนิด</text>
  <text x="95" y="190" class="sub">อนุภาคแอลฟา (α, ประจุ +)</text>

  <!-- แผ่นทองคำบาง -->
  <rect x="392" y="60" width="7" height="180" fill="#fbbf24" stroke="#d97706"/>
  <text x="396" y="48" class="lbl">แผ่นทองคำบางมาก</text>

  <!-- ฉากตรวจจับโค้งรอบ -->
  <path d="M600,40 A170,170 0 0 1 600,260" fill="none" stroke="#a5b4fc" stroke-width="7"/>
  <text x="640" y="150" class="lbl">ฉากเรืองแสง</text>

  <!-- ลำแอลฟา: ส่วนใหญ่ทะลุตรง -->
  <line x1="130" y1="130" x2="580" y2="118" class="alpha"/>
  <line x1="130" y1="150" x2="592" y2="150" class="alpha"/>
  <line x1="130" y1="170" x2="580" y2="182" class="alpha"/>
  <text x="500" y="106" class="sub" fill="#dc2626">ส่วนใหญ่ทะลุผ่านเป็นเส้นตรง → อะตอมส่วนใหญ่เป็นที่ว่าง</text>

  <!-- ส่วนน้อยเบนมุมกว้าง -->
  <path d="M130,158 L395,155 L560,250" class="alpha" stroke-dasharray="7 4"/>
  <text x="545" y="272" class="sub" fill="#b45309">น้อยมาก เบนมุมกว้าง</text>

  <!-- นาน ๆ ครั้ง สะท้อนกลับ -->
  <path d="M130,142 L394,146 L150,96" class="alpha" stroke-dasharray="3 4"/>
  <text x="190" y="82" class="sub" fill="#7c3aed">นาน ๆ ครั้ง สะท้อนกลับ → ชนนิวเคลียสเล็กที่หนาแน่นประจุบวก</text>
</svg>
