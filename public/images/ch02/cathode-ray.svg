<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="system-ui, sans-serif">
  <!-- หลอดรังสีแคโทดของทอมสัน: ลำรังสีเบนเข้าหาขั้วบวกของสนามไฟฟ้า -->
  <style>
    .lbl { font-size: 12.5px; fill: #1e293b; text-anchor: middle; }
    .sub { font-size: 11px; fill: #64748b; text-anchor: middle; }
  </style>
  <defs>
    <marker id="beam-ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- ตัวหลอดแก้ว -->
  <rect x="60" y="80" width="620" height="140" rx="70" fill="#f0f9ff" stroke="#94a3b8" stroke-width="2.5"/>

  <!-- แคโทด (ขั้วลบ ซ้าย) -->
  <rect x="92" y="120" width="12" height="60" fill="#475569"/>
  <text x="98" y="108" class="lbl">แคโทด (−)</text>

  <!-- แอโนดมีรู (ขั้วบวก) -->
  <rect x="210" y="100" width="12" height="38" fill="#475569"/>
  <rect x="210" y="162" width="12" height="38" fill="#475569"/>
  <text x="216" y="92" class="lbl">แอโนด (+) มีช่อง</text>

  <!-- แผ่นเบี่ยงเบนสนามไฟฟ้า -->
  <rect x="340" y="96" width="130" height="10" fill="#f59e0b"/>
  <text x="405" y="88" class="lbl">แผ่นประจุ +</text>
  <rect x="340" y="194" width="130" height="10" fill="#3b82f6"/>
  <text x="405" y="222" class="lbl">แผ่นประจุ −</text>

  <!-- ลำรังสี: ตรงจนถึงสนาม แล้วโค้งขึ้นหาแผ่นบวก -->
  <line x1="104" y1="150" x2="340" y2="150" stroke="#10b981" stroke-width="3"/>
  <path d="M340,150 Q420,150 470,128 T620,112" fill="none" stroke="#10b981" stroke-width="3" marker-end="url(#beam-ah)"/>
  <!-- แนวเดิมถ้าไม่มีสนาม (เส้นประ) -->
  <line x1="340" y1="150" x2="640" y2="150" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="585" y="166" class="sub">แนวตรงเดิม (ถ้าไม่มีสนามไฟฟ้า)</text>

  <!-- ฉากเรืองแสง -->
  <path d="M652,96 A70,70 0 0 1 652,204" fill="none" stroke="#fbbf24" stroke-width="6"/>
  <text x="642" y="248" class="lbl">ฉากเรืองแสง</text>

  <circle cx="620" cy="112" r="5" fill="#facc15" stroke="#d97706" stroke-width="1.5"/>

  <text x="380" y="278" class="sub" font-size="12">รังสีแคโทดเบนเข้าหา "แผ่นประจุบวก" → อนุภาคในรังสีมีประจุลบ (อิเล็กตรอน) · ทอมสันวัดอัตราส่วนประจุต่อมวลได้</text>
</svg>
