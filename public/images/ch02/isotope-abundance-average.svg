<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="system-ui, sans-serif">
  <!-- มวลอะตอมเฉลี่ยแบบถ่วงน้ำหนักด้วยร้อยละความอุดมสมบูรณ์ — ตัวอย่าง Li-6/Li-7 -->
  <style>
    .lbl { font-size: 12.5px; fill: #1e293b; text-anchor: middle; }
    .sub { font-size: 10.5px; fill: #64748b; text-anchor: middle; }
    .given { font-size: 12.5px; fill: #dc2626; font-weight: 700; text-anchor: middle; }
    .ax { stroke: #94a3b8; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="iaa-ah" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- เส้นจำนวนมวล 6.00 ถึง 7.00 -->
  <line x1="80" y1="150" x2="640" y2="150" class="ax" marker-end="url(#iaa-ah)"/>
  <text x="80" y="130" class="given">⁶Li = 6.00 u</text>
  <line x1="80" y1="140" x2="80" y2="160" class="ax"/>
  <text x="620" y="130" class="given">⁷Li = 7.00 u</text>
  <line x1="620" y1="140" x2="620" y2="160" class="ax"/>

  <!-- จุดมวลเฉลี่ยเอียงเข้าหา 7Li เพราะมีสัดส่วนมากกว่า -->
  <circle cx="585" cy="150" r="6" fill="#0d9488"/>
  <line x1="585" y1="160" x2="585" y2="200" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="585" y="220" class="lbl" fill="#0d9488">มวลเฉลี่ย = 6.94 u</text>
  <text x="585" y="238" class="sub">(เอียงเข้าใกล้ 7.00 มาก)</text>

  <!-- แถบสัดส่วน 6% / 94% -->
  <rect x="80" y="255" width="32" height="24" fill="#93c5fd"/>
  <rect x="112" y="255" width="508" height="24" fill="#1d4ed8"/>
  <text x="96" y="272" class="sub" fill="#1e293b" font-size="9">6%</text>
  <text x="366" y="272" class="sub" fill="#fff" font-weight="700">⁷Li 94%</text>
  <text x="350" y="300" class="sub">แถบสัดส่วนความอุดมสมบูรณ์ — ⁷Li มีมากกว่ามาก มวลเฉลี่ยจึงเอียงเข้าหา 7.00</text>

  <rect x="230" y="40" width="290" height="60" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="375" y="62" class="lbl" fill="#0d9488" font-weight="700">มวลเฉลี่ย = Σ(มวล×สัดส่วน)</text>
  <text x="375" y="82" class="sub">ไม่ใช่เฉลี่ยเลขคณิตธรรมดา (6+7)/2</text>
</svg>
