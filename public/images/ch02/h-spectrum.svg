<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 210" font-family="system-ui, sans-serif">
  <!-- สเปกตรัมเส้นของไฮโดรเจนช่วงตามองเห็น (อนุกรมบัลเมอร์) -->
  <style>
    .lbl { font-size: 12px; fill: #1e293b; text-anchor: middle; }
    .sub { font-size: 11px; fill: #64748b; text-anchor: middle; }
  </style>

  <!-- แถบพื้นสเปกตรัมมืด -->
  <rect x="70" y="50" width="620" height="70" fill="#0f172a" rx="4"/>

  <!-- เส้นสเปกตรัม 4 เส้นของ H (Balmer): ตำแหน่ง x เทียบสัดส่วนจริง 400-700 nm -->
  <!-- 410 nm ม่วง: x = 70 + (410-400)/300*620 = 90.7 -->
  <rect x="89" y="50" width="3.5" height="70" fill="#7c3aed"/>
  <!-- 434 nm น้ำเงินม่วง: x = 140.3 -->
  <rect x="139" y="50" width="3.5" height="70" fill="#4f46e5"/>
  <!-- 486 nm เขียวน้ำเงิน: x = 247.7 -->
  <rect x="246" y="50" width="3.5" height="70" fill="#06b6d4"/>
  <!-- 656 nm แดง: x = 599.2 -->
  <rect x="598" y="50" width="3.5" height="70" fill="#ef4444"/>

  <text x="91" y="42" class="lbl">410</text>
  <text x="141" y="42" class="lbl">434</text>
  <text x="248" y="42" class="lbl">486</text>
  <text x="600" y="42" class="lbl">656 nm</text>

  <!-- แกนความยาวคลื่น -->
  <line x1="70" y1="132" x2="690" y2="132" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="70" y="150" class="sub">400 nm</text>
  <text x="690" y="150" class="sub">700 nm</text>
  <text x="380" y="150" class="sub">ความยาวคลื่น →</text>

  <text x="380" y="180" class="sub" font-size="12">แก๊ส H ถูกกระตุ้นแล้วคายแสงเป็น "เส้น" เฉพาะค่า ไม่ต่อเนื่อง → หลักฐานว่าระดับพลังงานเป็นชั้น (quantized)</text>
  <text x="380" y="198" class="sub">4 เส้นที่ตามองเห็น = อนุกรมบัลเมอร์ (อิเล็กตรอนตกลงมาที่ n = 2)</text>
</svg>
