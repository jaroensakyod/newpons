<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="system-ui, sans-serif">
  <!-- แผนภาพระดับพลังงานโบร์ของไฮโดรเจน + การเกิดอนุกรมสเปกตรัม -->
  <style>
    .lv  { stroke: #334155; stroke-width: 2; }
    .en  { font-size: 11.5px; fill: #475569; }
    .nlb { font-size: 12.5px; font-weight: 700; fill: #1e293b; }
    .sub { font-size: 11px; fill: #64748b; text-anchor: middle; }
    .ser { font-size: 11.5px; font-weight: 700; text-anchor: middle; }
  </style>
  <defs>
    <marker id="da" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#7c3aed"/>
    </marker>
    <marker id="ba" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0891b2"/>
    </marker>
    <marker id="pa" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- ระดับพลังงาน: ยิ่งสูง n ยิ่งชิดกัน (ตำแหน่ง y ตามสัดส่วน E_n = -13.6/n²) -->
  <!-- n=1: y=270 · n=2: y=120 · n=3: y=92 · n=4: y=82 · n=5: y=78 · n=∞: y=68 -->
  <line x1="120" y1="270" x2="640" y2="270" class="lv"/>
  <line x1="120" y1="120" x2="640" y2="120" class="lv"/>
  <line x1="120" y1="92"  x2="640" y2="92"  class="lv"/>
  <line x1="120" y1="82"  x2="640" y2="82"  class="lv"/>
  <line x1="120" y1="68"  x2="640" y2="68"  class="lv" stroke-dasharray="5 4"/>

  <text x="96" y="274" class="nlb">n=1</text>
  <text x="96" y="124" class="nlb">n=2</text>
  <text x="96" y="96"  class="nlb">n=3</text>
  <text x="62" y="86"  class="nlb">n=4</text>
  <text x="28" y="72"  class="nlb">n=∞</text>
  <line x1="88" y1="82" x2="118" y2="82" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="54" y1="68" x2="118" y2="68" stroke="#cbd5e1" stroke-width="1"/>

  <text x="648" y="274" class="en">−13.6 eV</text>
  <text x="648" y="124" class="en">−3.4 eV</text>
  <text x="648" y="96"  class="en">−1.51 eV</text>
  <text x="700" y="86"  class="en">−0.85 eV</text>
  <text x="648" y="66"  class="en">0 eV</text>
  <line x1="642" y1="82" x2="696" y2="82" stroke="#cbd5e1" stroke-width="1"/>

  <!-- อนุกรมไลมัน: ตกสู่ n=1 (UV) -->
  <line x1="180" y1="120" x2="180" y2="266" stroke="#7c3aed" stroke-width="2" marker-end="url(#da)"/>
  <line x1="210" y1="92"  x2="210" y2="266" stroke="#7c3aed" stroke-width="2" marker-end="url(#da)"/>
  <text x="196" y="292" class="ser" fill="#7c3aed">ไลมัน → n=1 (UV)</text>

  <!-- อนุกรมบัลเมอร์: ตกสู่ n=2 (แสงที่ตามองเห็น) -->
  <line x1="360" y1="92" x2="360" y2="116" stroke="#0891b2" stroke-width="2" marker-end="url(#ba)"/>
  <line x1="390" y1="82" x2="390" y2="116" stroke="#0891b2" stroke-width="2" marker-end="url(#ba)"/>
  <text x="376" y="145" class="ser" fill="#0891b2">บัลเมอร์ → n=2 (ตามองเห็น)</text>

  <!-- อนุกรมพาสเชน: ตกสู่ n=3 (IR) -->
  <line x1="540" y1="82" x2="540" y2="88" stroke="#dc2626" stroke-width="2" marker-end="url(#pa)"/>
  <line x1="570" y1="68" x2="570" y2="88" stroke="#dc2626" stroke-width="2" marker-end="url(#pa)"/>
  <text x="556" y="110" class="ser" fill="#dc2626">พาสเชน → n=3 (IR)</text>

  <text x="380" y="312" class="sub" font-size="12">ยิ่ง n สูง ระดับยิ่งชิดกัน · อิเล็กตรอน "ตก" จากชั้นสูงลงชั้นต่ำ → คายโฟตอนพลังงานเท่าผลต่างระดับพอดี</text>
</svg>
