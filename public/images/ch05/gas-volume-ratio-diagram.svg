<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="system-ui, sans-serif">
  <!-- ที่อุณหภูมิ/ความดันเดียวกัน อัตราส่วนปริมาตรแก๊ส = อัตราส่วนโมล = อัตราส่วนสัมประสิทธิ์ (Avogadro/Gay-Lussac) -->
  <style>
    .lbl { font-size: 12.5px; fill: #1e293b; text-anchor: middle; font-weight: 700; }
    .sub { font-size: 10px; fill: #64748b; text-anchor: middle; }
    .given { font-size: 11px; fill: #dc2626; font-weight: 700; text-anchor: middle; }
  </style>
  <defs>
    <marker id="gvr-ah" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="360" y="20" class="lbl" font-size="14">CₓHᵧ 10 cm³ + O₂ 45 cm³ → CO₂ 30 cm³ + H₂O(ล.) (T,P เดียวกันทุกแก๊ส)</text>

  <rect x="40" y="50" width="120" height="60" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="100" y="75" class="sub" font-weight="700">CₓHᵧ</text>
  <text x="100" y="93" class="given">10 cm³</text>

  <text x="190" y="85" class="lbl">+</text>

  <rect x="220" y="50" width="120" height="60" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="280" y="75" class="sub" fill="#2563eb" font-weight="700">O₂</text>
  <text x="280" y="93" class="given">45 cm³</text>

  <line x1="360" y1="80" x2="410" y2="80" stroke="#64748b" stroke-width="2" marker-end="url(#gvr-ah)"/>

  <rect x="420" y="50" width="120" height="60" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="2.5"/>
  <text x="480" y="75" class="sub" fill="#0d9488" font-weight="700">CO₂</text>
  <text x="480" y="93" class="given">30 cm³</text>

  <rect x="90" y="130" width="540" height="145" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5"/>
  <text x="360" y="153" class="lbl" fill="#ea580c" font-size="12">กฎของอาโวกาโดร: ที่ T,P เดียวกัน ปริมาตรแก๊สเป็นสัดส่วนตรงกับจำนวนโมล</text>
  <text x="360" y="174" class="sub">จึงใช้ "อัตราส่วนปริมาตร" แทน "อัตราส่วนโมล" ได้โดยตรง ไม่ต้องแปลงเป็นโมล/มวลก่อน</text>
  <text x="360" y="196" class="sub">หา x จากอัตราส่วน CₓHᵧ : CO₂ = 10 : 30 = 1 : 3 → x = 3</text>
  <text x="360" y="216" class="sub">หา y จากอัตราส่วน CₓHᵧ : O₂ = 10 : 45 = 1 : 4.5 → x+y/4 = 4.5 → y = 6</text>
  <text x="360" y="238" class="given" font-size="12">สูตรโมเลกุลคือ C₃H₆</text>
  <text x="360" y="258" class="sub">ต่างจากการวิเคราะห์การเผาไหม้แบบมวล (C,H,O compound) ที่ต้องหามวล O จากผลต่างมวล — ที่นี่ไม่มี O ในเชื้อเพลิงเลย</text>
</svg>
