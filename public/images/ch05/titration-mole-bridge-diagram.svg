<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="system-ui, sans-serif">
  <!-- ไทเทรต H2SO4 ด้วย NaOH: n=CV หาโมล NaOH -> อัตราส่วนโมลจากสมการ -> ย้อนกลับหา C ของกรด -->
  <style>
    .lbl { font-size: 12.5px; fill: #1e293b; text-anchor: middle; font-weight: 700; }
    .sub { font-size: 10px; fill: #64748b; text-anchor: middle; }
    .given { font-size: 11px; fill: #dc2626; font-weight: 700; text-anchor: middle; }
  </style>
  <defs>
    <marker id="tmb-ah" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="360" y="20" class="lbl" font-size="14">ไทเทรต: H₂SO₄ 25.0 mL + NaOH 0.150 mol/L ปริมาตร 40.0 mL พอดี</text>

  <!-- burette + flask -->
  <rect x="70" y="45" width="18" height="80" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="79" y="140" class="sub">บิวเรต</text>
  <text x="79" y="155" class="sub" fill="#2563eb">NaOH</text>
  <path d="M180,90 L165,140 L235,140 L220,90 Z" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="200" y="160" class="sub">ขวดรูปชมพู่</text>
  <text x="200" y="175" class="sub" fill="#dc2626">H₂SO₄</text>

  <rect x="290" y="60" width="180" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="380" y="83" class="sub" fill="#2563eb" font-weight="700">n(NaOH) = C×V</text>
  <text x="380" y="103" class="given">= 0.150×0.0400 = 6.0 mmol</text>
  <text x="380" y="120" class="sub">(ณ จุดสมมูล วัดจากปริมาตรที่ใช้)</text>

  <line x1="480" y1="95" x2="530" y2="95" stroke="#94a3b8" stroke-width="2" marker-end="url(#tmb-ah)"/>

  <rect x="540" y="60" width="150" height="70" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="2.5"/>
  <text x="615" y="83" class="sub" fill="#0d9488" font-weight="700">อัตราส่วนโมล</text>
  <text x="615" y="103" class="sub">H₂SO₄ : NaOH = 1 : 2</text>
  <text x="615" y="120" class="given" font-size="10">n(H₂SO₄) = 3.0 mmol</text>

  <rect x="120" y="210" width="480" height="90" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5"/>
  <text x="360" y="233" class="lbl" fill="#ea580c" font-size="12">ย้อนกลับหาความเข้มข้นของกรด</text>
  <text x="360" y="255" class="sub">C(H₂SO₄) = n(H₂SO₄) ÷ V(H₂SO₄) = 0.0030 mol ÷ 0.0250 L</text>
  <text x="360" y="277" class="given" font-size="13">C(H₂SO₄) = 0.12 mol/L</text>
  <text x="360" y="295" class="sub">ข้อควรระวัง: ต่างจากการเจือจางสารเดียวกัน (C₁V₁=C₂V₂) — สารต่างชนิดต้องผ่านอัตราส่วนโมลจากสมการเสมอ</text>
</svg>
