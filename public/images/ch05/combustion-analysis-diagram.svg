<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="system-ui, sans-serif">
  <!-- วิเคราะห์การเผาไหม้สาร CxHyOz: หา C จาก CO2, H จาก H2O, O จากผลต่างมวล (ห้ามคิด O จาก CO2/H2O ตรงๆ) -->
  <style>
    .lbl { font-size: 12.5px; fill: #1e293b; text-anchor: middle; font-weight: 700; }
    .sub { font-size: 10px; fill: #64748b; text-anchor: middle; }
    .given { font-size: 11px; fill: #dc2626; font-weight: 700; text-anchor: middle; }
  </style>
  <defs>
    <marker id="cad-ah" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="360" y="20" class="lbl" font-size="14">วิเคราะห์การเผาไหม้: C_xH_yO_z 0.90 g + O₂ → CO₂ 1.32 g + H₂O 0.54 g</text>

  <rect x="40" y="50" width="130" height="55" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="105" y="72" class="sub" font-weight="700">C_xH_yO_z</text>
  <text x="105" y="90" class="given" font-size="10">0.90 g</text>

  <text x="190" y="82" class="lbl">+ O₂ →</text>

  <rect x="240" y="50" width="130" height="55" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="305" y="72" class="sub" fill="#2563eb" font-weight="700">CO₂</text>
  <text x="305" y="90" class="given" font-size="10">1.32 g</text>

  <rect x="400" y="50" width="130" height="55" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="465" y="72" class="sub" fill="#dc2626" font-weight="700">H₂O</text>
  <text x="465" y="90" class="given" font-size="10">0.54 g</text>

  <line x1="305" y1="105" x2="305" y2="130" stroke="#2563eb" stroke-width="2" marker-end="url(#cad-ah)"/>
  <text x="305" y="148" class="sub" fill="#2563eb">n(C) = n(CO₂) = 1.32/44 = 0.03 mol</text>
  <text x="305" y="164" class="sub" fill="#2563eb">มวล C = 0.36 g</text>

  <line x1="465" y1="105" x2="465" y2="130" stroke="#dc2626" stroke-width="2" marker-end="url(#cad-ah)"/>
  <text x="465" y="148" class="sub" fill="#dc2626">n(H) = 2×n(H₂O) = 2×0.03 = 0.06 mol</text>
  <text x="465" y="164" class="sub" fill="#dc2626">มวล H = 0.06 g</text>

  <rect x="90" y="190" width="540" height="90" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5"/>
  <text x="360" y="212" class="lbl" fill="#ea580c" font-size="12">หา O ด้วยวิธีผลต่างมวลเท่านั้น (ห้ามคิดจาก CO₂/H₂O ตรงๆ)</text>
  <text x="360" y="232" class="sub">เพราะออกซิเจนใน CO₂ และ H₂O บางส่วนมาจากแก๊ส O₂ ที่ใช้เผา ไม่ได้มาจากสารตัวอย่างทั้งหมด</text>
  <text x="360" y="252" class="sub" font-weight="700">มวล O = 0.90 − 0.36 − 0.06 = 0.48 g → n(O) = 0.48/16 = 0.03 mol</text>
  <text x="360" y="270" class="sub">C : H : O = 0.03 : 0.06 : 0.03 = 1 : 2 : 1 → สูตรเอมพิริคัล CH₂O</text>
</svg>
