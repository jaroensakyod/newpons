<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 320" font-family="system-ui, sans-serif">
  <!-- สารกำหนดปริมาณ: เทียบ mol/สัมประสิทธิ์ ตัวไหนน้อยกว่าคือตัวหมดก่อน + ผลได้ร้อยละ = จริง/ทฤษฎี×100 -->
  <style>
    .lbl { font-size: 12.5px; fill: #1e293b; text-anchor: middle; font-weight: 700; }
    .sub { font-size: 10px; fill: #64748b; text-anchor: middle; }
    .given { font-size: 11px; fill: #dc2626; font-weight: 700; text-anchor: middle; }
  </style>

  <text x="370" y="20" class="lbl" font-size="14">สารกำหนดปริมาณ: N₂ + 3H₂ → 2NH₃ (N₂ 28 g, H₂ 9 g)</text>

  <rect x="40" y="45" width="300" height="95" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="190" y="68" class="sub" font-weight="700">N₂: 28 g = 1 mol</text>
  <text x="190" y="88" class="sub">เทียบ mol ÷ สัมประสิทธิ์ = 1/1 = 1</text>
  <text x="190" y="110" class="given">ค่าน้อยกว่า → หมดก่อน (limiting)</text>
  <text x="190" y="128" class="sub">ผลิต NH₃ ตามทฤษฎี = 2×1 = 2 mol = 34 g</text>

  <rect x="400" y="45" width="300" height="95" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
  <text x="550" y="68" class="sub" font-weight="700">H₂: 9 g = 4.5 mol</text>
  <text x="550" y="88" class="sub">เทียบ mol ÷ สัมประสิทธิ์ = 4.5/3 = 1.5</text>
  <text x="550" y="110" class="sub">ค่ามากกว่า → เหลือ (excess)</text>
  <text x="550" y="128" class="sub">ใช้ไปจริง 3 mol = 6 g เหลือ 9−6 = 3 g</text>

  <line x1="30" y1="160" x2="710" y2="160" stroke="#e2e8f0" stroke-width="1.5"/>

  <text x="370" y="185" class="lbl" font-size="13">ผลได้ร้อยละ (Percent Yield): CaCO₃ 50 g → CaO</text>

  <rect x="90" y="205" width="560" height="95" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5"/>
  <text x="370" y="228" class="sub" font-weight="700">ผลได้ทฤษฎี = n(CaCO₃)×M(CaO) = (50/100)×56 = 28 g</text>
  <text x="370" y="250" class="sub">ผลได้จริง (ชั่งได้จากการทดลอง) = 22.4 g</text>
  <text x="370" y="272" class="given" font-size="13">% ผลได้ = (ผลได้จริง/ผลได้ทฤษฎี)×100 = (22.4/28)×100 = 80%</text>
  <text x="370" y="290" class="sub">ผลได้จริงต้องมาจากการชั่ง/วัดจริงเสมอ ไม่ใช่ตัวเลขที่คำนวณจากสมการ</text>
</svg>
