<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="system-ui, sans-serif">
  <!-- โมลเป็นศูนย์กลาง: มวล(g) <-> โมล (÷M/×M), โมล <-> อนุภาค (×NA/÷NA), โมล <-> ปริมาตรที่ STP (×22.4/÷22.4) -->
  <style>
    .lbl { font-size: 13px; fill: #1e293b; text-anchor: middle; font-weight: 700; }
    .sub { font-size: 10px; fill: #64748b; text-anchor: middle; }
    .given { font-size: 11px; fill: #dc2626; font-weight: 700; text-anchor: middle; }
  </style>
  <defs>
    <marker id="mcs-ah" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="350" y="22" class="lbl" font-size="14">โมลเป็นศูนย์กลาง — สะพานเชื่อมมวล อนุภาค และปริมาตรแก๊ส</text>

  <!-- ศูนย์กลาง: โมล -->
  <circle cx="350" cy="170" r="48" fill="#f0fdfa" stroke="#0d9488" stroke-width="3"/>
  <text x="350" y="176" class="lbl" fill="#0d9488" font-size="16">โมล</text>

  <!-- มวล (ซ้าย) -->
  <rect x="40" y="140" width="140" height="60" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="110" y="165" class="lbl" fill="#2563eb" font-size="12">มวล (g)</text>
  <text x="110" y="185" class="sub">n = มวล ÷ M</text>

  <line x1="180" y1="160" x2="302" y2="160" stroke="#2563eb" stroke-width="2" marker-end="url(#mcs-ah)"/>
  <line x1="302" y1="180" x2="180" y2="180" stroke="#2563eb" stroke-width="2" marker-end="url(#mcs-ah)"/>
  <text x="240" y="150" class="sub" fill="#2563eb">÷M</text>
  <text x="240" y="200" class="sub" fill="#2563eb">×M</text>

  <!-- อนุภาค (บนขวา) -->
  <rect x="500" y="60" width="160" height="60" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
  <text x="580" y="85" class="lbl" fill="#dc2626" font-size="12">อนุภาค (โมเลกุล/อะตอม)</text>
  <text x="580" y="105" class="sub">จำนวน = n × N_A</text>

  <line x1="385" y1="140" x2="500" y2="105" stroke="#dc2626" stroke-width="2" marker-end="url(#mcs-ah)"/>
  <text x="450" y="115" class="sub" fill="#dc2626">×N_A</text>

  <!-- ปริมาตรแก๊สที่ STP (ล่างขวา) -->
  <rect x="500" y="215" width="160" height="60" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5"/>
  <text x="580" y="240" class="lbl" fill="#ea580c" font-size="12">ปริมาตรแก๊สที่ STP</text>
  <text x="580" y="260" class="sub">V = n × 22.4 L</text>

  <line x1="385" y1="195" x2="500" y2="235" stroke="#ea580c" stroke-width="2" marker-end="url(#mcs-ah)"/>
  <text x="450" y="230" class="sub" fill="#ea580c">×22.4</text>

  <rect x="40" y="295" width="620" height="35" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="350" y="317" class="given">ตัวอย่าง: H₂O 9 g = 0.5 mol = 3.01×10²³ โมเลกุล = อะตอม H 6.02×10²³ อะตอม</text>
</svg>
