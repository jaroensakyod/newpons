<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" font-family="system-ui, sans-serif">
  <!-- วัฏจักรบอร์น-ฮาเบอร์ของ NaCl แบบเต็ม 5 ขั้น: 108+496+122-349-787=-410 kJ/mol -->
  <style>
    .lbl { font-size: 12px; fill: #1e293b; text-anchor: middle; font-weight: 700; }
    .sub { font-size: 9.5px; fill: #64748b; text-anchor: middle; }
    .val { font-size: 11px; font-weight: 700; text-anchor: start; }
  </style>
  <defs>
    <marker id="bh-ah" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="390" y="20" class="lbl" font-size="14">วัฏจักรบอร์น-ฮาเบอร์: Na(s) + ½Cl₂(g) → NaCl(s)</text>

  <!-- ระดับเริ่มต้น -->
  <rect x="30" y="290" width="150" height="34" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="105" y="312" class="sub" font-weight="700">Na(s) + ½Cl₂(g)</text>

  <!-- ขั้น 1: ระเหิด +108 -->
  <line x1="105" y1="290" x2="105" y2="240" stroke="#2563eb" stroke-width="2" marker-end="url(#bh-ah)"/>
  <text x="115" y="255" class="val" fill="#2563eb">1) ระเหิด Na: +108</text>
  <rect x="30" y="210" width="150" height="30" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="105" y="230" class="sub" font-weight="700">Na(g) + ½Cl₂(g)</text>

  <!-- ขั้น 2: IE1 +496 -->
  <line x1="180" y1="225" x2="260" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#bh-ah)"/>
  <text x="270" y="165" class="val" fill="#2563eb">2) IE₁(Na): +496</text>
  <rect x="230" y="115" width="180" height="30" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="135" class="sub" font-weight="700">Na⁺(g) + e⁻ + ½Cl₂(g)</text>

  <!-- ขั้น 3: 1/2 dissociation +122 -->
  <line x1="410" y1="130" x2="480" y2="100" stroke="#ea580c" stroke-width="2" marker-end="url(#bh-ah)"/>
  <text x="490" y="105" class="val" fill="#ea580c">3) ½ สลาย Cl–Cl: +122</text>
  <rect x="440" y="65" width="180" height="30" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="530" y="85" class="sub" font-weight="700">Na⁺(g) + e⁻ + Cl(g)</text>

  <!-- ขั้น 4: EA -349 -->
  <line x1="620" y1="95" x2="690" y2="150" stroke="#0d9488" stroke-width="2" marker-end="url(#bh-ah)"/>
  <text x="655" y="135" class="val" fill="#0d9488" text-anchor="end">4) EA(Cl): −349</text>
  <rect x="600" y="150" width="170" height="30" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="685" y="170" class="sub" font-weight="700">Na⁺(g) + Cl⁻(g)</text>

  <!-- ขั้น 5: lattice -787 -->
  <line x1="680" y1="180" x2="480" y2="290" stroke="#dc2626" stroke-width="2.5" marker-end="url(#bh-ah)"/>
  <text x="580" y="245" class="val" fill="#dc2626">5) พลังงานแลตทิซ: −787</text>

  <rect x="380" y="295" width="140" height="34" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
  <text x="450" y="317" class="sub" font-weight="700" fill="#dc2626">NaCl(s)</text>

  <rect x="60" y="340" width="660" height="34" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="390" y="362" class="sub" font-weight="700" fill="#0d9488">ΔHf = 108 + 496 + 122 + (−349) + (−787) = −410 kJ/mol (กฎของเฮสส์: ผลรวมทุกขั้น = ผลรวมทั้งวัฏจักร)</text>
</svg>
