<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 300" font-family="system-ui, sans-serif">
  <!-- สเปกตรัมชนิดพันธะตาม ΔEN: ไม่มีขั้ว < มีขั้ว < ไอออนิก (เป็นสเปกตรัมต่อเนื่อง ไม่ใช่เส้นแบ่งเด็ดขาด) -->
  <style>
    .lbl { font-size: 12.5px; fill: #1e293b; text-anchor: middle; font-weight: 700; }
    .sub { font-size: 10px; fill: #64748b; text-anchor: middle; }
    .val { font-size: 11px; font-weight: 700; text-anchor: middle; }
  </style>
  <defs>
    <linearGradient id="btd-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="45%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#fca5a5"/>
    </linearGradient>
  </defs>

  <text x="370" y="24" class="lbl" font-size="14">สเปกตรัมชนิดพันธะตามผลต่างอิเล็กโทรเนกาติวิตี (ΔEN)</text>

  <rect x="60" y="60" width="620" height="40" rx="8" fill="url(#btd-grad)" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="330" y1="60" x2="330" y2="100" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="480" y1="60" x2="480" y2="100" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="3 2"/>

  <text x="60" y="55" class="val" text-anchor="start">ΔEN = 0</text>
  <text x="330" y="55" class="val">0.5</text>
  <text x="680" y="55" class="val" text-anchor="end">1.7+</text>

  <text x="195" y="118" class="lbl" font-size="11">พันธะโคเวเลนต์ไม่มีขั้ว</text>
  <text x="195" y="134" class="sub">เช่น Cl₂ (0.0), C−H (0.4)</text>

  <text x="405" y="118" class="lbl" font-size="11">พันธะโคเวเลนต์มีขั้ว</text>
  <text x="405" y="134" class="sub">เช่น H−Cl (0.9), H−F (1.9 ก็ยังถือโคเวเลนต์)</text>

  <text x="595" y="118" class="lbl" font-size="11">พันธะไอออนิก</text>
  <text x="595" y="134" class="sub">เช่น NaCl (2.1), MgO (2.3)</text>

  <rect x="60" y="160" width="620" height="90" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="370" y="182" class="lbl" fill="#ea580c" font-size="12">ข้อควรระวัง: เป็นสเปกตรัมต่อเนื่อง ไม่ใช่เส้นแบ่งตายตัว</text>
  <text x="370" y="203" class="sub">ตัวเลข 0.5 และ 1.7 เป็นเกณฑ์คร่าวๆ ที่ตำราส่วนใหญ่ใช้ ไม่ใช่กฎตายตัวทางฟิสิกส์</text>
  <text x="370" y="222" class="sub">กรณีก้ำกึ่ง เช่น AlCl₃ (ΔEN ≈ 1.5) มีสมบัติแบบโคเวเลนต์มากกว่าที่ ΔEN ทำนาย</text>
  <text x="370" y="240" class="sub">(สารประกอบระหว่างโลหะ+อโลหะไม่ได้แปลว่าต้องเป็นไอออนิกเสมอไป)</text>

  <text x="370" y="275" class="sub">หลักการ: ΔEN ยิ่งมาก อิเล็กตรอนคู่ร่วมพันธะยิ่งถูกดึงไปทางอะตอมที่มี EN สูงกว่ามากเท่านั้น</text>
</svg>
