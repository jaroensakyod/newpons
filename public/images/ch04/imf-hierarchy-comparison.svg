<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 300" font-family="system-ui, sans-serif">
  <!-- ลำดับความแรงแรงระหว่างโมเลกุล: ลอนดอน < ขั้ว-ขั้ว < ไอออน-ขั้ว < พันธะไฮโดรเจน -->
  <style>
    .lbl { font-size: 12.5px; fill: #1e293b; text-anchor: middle; font-weight: 700; }
    .sub { font-size: 9.5px; fill: #64748b; text-anchor: middle; }
    .f { font-size: 12px; font-weight: 700; text-anchor: middle; }
  </style>
  <defs>
    <marker id="imf-ah" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="370" y="22" class="lbl" font-size="14">ลำดับความแรงของแรงระหว่างโมเลกุล (IMF)</text>

  <line x1="70" y1="55" x2="670" y2="55" stroke="#94a3b8" stroke-width="2" marker-end="url(#imf-ah)"/>
  <text x="70" y="45" class="sub" text-anchor="start">อ่อน</text>
  <text x="670" y="45" class="sub" text-anchor="end">แรง</text>

  <!-- ลอนดอน -->
  <rect x="45" y="75" width="140" height="100" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="115" y="98" class="f">แรงลอนดอน</text>
  <text x="115" y="118" class="sub">ทุกโมเลกุลมี</text>
  <text x="115" y="134" class="sub">ยิ่งโมเลกุลใหญ่</text>
  <text x="115" y="150" class="sub">ยิ่งแรงขึ้น</text>
  <text x="115" y="168" class="sub" font-weight="700">เช่น Cl₂, CH₄</text>

  <!-- ขั้ว-ขั้ว -->
  <rect x="205" y="75" width="140" height="100" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="275" y="98" class="f" fill="#2563eb">ขั้ว-ขั้ว</text>
  <text x="275" y="118" class="sub">โมเลกุลมีขั้วทั้งคู่</text>
  <text x="275" y="134" class="sub">ดึงดูดกันด้วย</text>
  <text x="275" y="150" class="sub">ประจุบวก-ลบย่อย</text>
  <text x="275" y="168" class="sub" font-weight="700">เช่น HCl, SO₂</text>

  <!-- พันธะไฮโดรเจน -->
  <rect x="365" y="75" width="140" height="100" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="435" y="98" class="f" fill="#0d9488">พันธะไฮโดรเจน</text>
  <text x="435" y="118" class="sub">ขั้ว-ขั้วชนิดพิเศษ</text>
  <text x="435" y="134" class="sub">ต้องมี H เกาะ</text>
  <text x="435" y="150" class="sub">N/O/F โดยตรง</text>
  <text x="435" y="168" class="sub" font-weight="700">เช่น H₂O, HF, NH₃</text>

  <!-- ไอออน-ขั้ว -->
  <rect x="525" y="75" width="150" height="100" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="600" y="98" class="f" fill="#dc2626">ไอออน-ขั้ว</text>
  <text x="600" y="118" class="sub">ไอออนกับโมเลกุล</text>
  <text x="600" y="134" class="sub">มีขั้ว (ประจุเต็มหน่วย</text>
  <text x="600" y="150" class="sub">ดึงดูดแรงกว่ามาก)</text>
  <text x="600" y="168" class="sub" font-weight="700">เช่น Na⁺ ในน้ำ</text>

  <rect x="70" y="200" width="600" height="80" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="370" y="222" class="lbl" fill="#ea580c" font-size="12">ข้อควรระวัง: นี่คือลำดับความแรง "ต่อชนิดแรง" ไม่ใช่กฎตายตัวเสมอไป</text>
  <text x="370" y="242" class="sub">โมเลกุลไม่มีขั้วที่มีขนาดใหญ่มาก (เช่นสายโซ่คาร์บอนยาว) อาจมีแรงลอนดอนรวมมากกว่า</text>
  <text x="370" y="260" class="sub">โมเลกุลมีขั้วขนาดเล็กบางตัวได้ — ต้องพิจารณาทั้งชนิดแรงและขนาดโมเลกุลร่วมกันเสมอ</text>
</svg>
