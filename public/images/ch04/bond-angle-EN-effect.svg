<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="system-ui, sans-serif">
  <!-- 2 กฎ EN ที่มีผลตรงข้ามกัน: EN อะตอมกลางสูง -> มุมกว้างขึ้น, EN อะตอมล้อมรอบสูง -> มุมแคบลง -->
  <style>
    .lbl { font-size: 12.5px; fill: #1e293b; text-anchor: middle; font-weight: 700; }
    .sub { font-size: 10px; fill: #64748b; text-anchor: middle; }
    .ang { font-size: 15px; fill: #dc2626; text-anchor: middle; font-weight: 700; }
    .rule { font-size: 12px; text-anchor: middle; font-weight: 700; }
  </style>

  <text x="380" y="22" class="lbl" font-size="14">ผลของ EN ต่อมุมพันธะ — สองกฎที่ทิศทางตรงข้ามกัน อย่าสับสน</text>

  <!-- ซ้าย: EN อะตอมกลาง -->
  <rect x="30" y="45" width="340" height="270" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="200" y="68" class="rule" fill="#2563eb">กฎ 1: EN ของอะตอมกลาง</text>
  <text x="200" y="86" class="sub">อะตอมกลาง EN สูง → มุมพันธะ "กว้าง" ขึ้น</text>

  <text x="120" y="130" class="sub" font-weight="700">H₂O (O เป็นอะตอมกลาง)</text>
  <text x="120" y="160" class="ang">104.5°</text>
  <text x="120" y="178" class="sub">O: EN = 3.5 (สูง)</text>

  <line x1="200" y1="120" x2="200" y2="230" stroke="#94a3b8" stroke-width="1.5"/>

  <text x="285" y="130" class="sub" font-weight="700">H₂S (S เป็นอะตอมกลาง)</text>
  <text x="285" y="160" class="ang">92.1°</text>
  <text x="285" y="178" class="sub">S: EN = 2.5 (ต่ำกว่า)</text>

  <rect x="55" y="210" width="290" height="90" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="200" y="232" class="sub" fill="#2563eb" font-weight="700">O ดึงอิเล็กตรอนคู่ผูกเข้าหาตัวเองแรงกว่า</text>
  <text x="200" y="250" class="sub">ทำให้กลุ่มอิเล็กตรอนพันธะ "ผอมลง" อยู่ใกล้ O</text>
  <text x="200" y="268" class="sub">คู่โดดเดี่ยวจึงผลักพันธะให้แคบได้น้อยกว่า</text>
  <text x="200" y="286" class="sub">→ มุม H–O–H จึงกว้างกว่า H–S–H</text>

  <!-- ขวา: EN อะตอมล้อมรอบ -->
  <rect x="390" y="45" width="340" height="270" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
  <text x="560" y="68" class="rule" fill="#dc2626">กฎ 2: EN ของอะตอมล้อมรอบ</text>
  <text x="560" y="86" class="sub">อะตอมล้อมรอบ EN สูง → มุมพันธะ "แคบ" ลง</text>

  <text x="480" y="130" class="sub" font-weight="700">NH₃ (ล้อมรอบด้วย H)</text>
  <text x="480" y="160" class="ang">107°</text>
  <text x="480" y="178" class="sub">H: EN = 2.1 (ต่ำ)</text>

  <line x1="560" y1="120" x2="560" y2="230" stroke="#94a3b8" stroke-width="1.5"/>

  <text x="645" y="130" class="sub" font-weight="700">NF₃ (ล้อมรอบด้วย F)</text>
  <text x="645" y="160" class="ang">102°</text>
  <text x="645" y="178" class="sub">F: EN = 4.0 (สูงกว่า)</text>

  <rect x="415" y="210" width="290" height="90" rx="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="560" y="232" class="sub" fill="#dc2626" font-weight="700">F ดึงอิเล็กตรอนคู่ผูกออกจาก N แรงกว่า H</text>
  <text x="560" y="250" class="sub">ทำให้กลุ่มอิเล็กตรอนพันธะเลื่อนห่างจาก N มากขึ้น</text>
  <text x="560" y="268" class="sub">คู่โดดเดี่ยวบน N จึงผลักพันธะให้แคบได้มากกว่า</text>
  <text x="560" y="286" class="sub">→ มุม F–N–F จึงแคบกว่า H–N–H</text>

  <text x="380" y="325" class="sub">จุดสำคัญ: กฎข้อ 1 ดูที่อะตอมกลางเปลี่ยน (เปรียบเทียบคนละธาตุกลาง), กฎข้อ 2 ดูที่อะตอมล้อมรอบเปลี่ยน (อะตอมกลางเดิม)</text>
</svg>
