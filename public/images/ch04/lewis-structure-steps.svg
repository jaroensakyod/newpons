<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 380" font-family="system-ui, sans-serif">
  <!-- 5 ขั้นตอนเขียนโครงสร้างลิวอิส ใช้ CO3^2- เป็นตัวอย่าง -->
  <style>
    .lbl { font-size: 12px; fill: #1e293b; text-anchor: middle; font-weight: 700; }
    .sub { font-size: 10px; fill: #64748b; text-anchor: middle; }
    .step { font-size: 13px; fill: #ffffff; font-weight: 700; text-anchor: middle; }
  </style>

  <text x="370" y="24" class="lbl" font-size="14">5 ขั้นตอนเขียนโครงสร้างลิวอิส — ตัวอย่าง CO₃²⁻</text>

  <!-- ขั้น 1 -->
  <circle cx="70" cy="70" r="16" fill="#0d9488"/>
  <text x="70" y="75" class="step">1</text>
  <text x="240" y="65" class="lbl" text-anchor="start" font-size="11">นับอิเล็กตรอนวาเลนซ์รวม</text>
  <text x="240" y="82" class="sub" text-anchor="start">C(4) + 3×O(6) + ประจุ 2− = 4+18+2 = 24 อิเล็กตรอน</text>

  <line x1="30" y1="100" x2="710" y2="100" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ขั้น 2 -->
  <circle cx="70" cy="130" r="16" fill="#0d9488"/>
  <text x="70" y="135" class="step">2</text>
  <text x="240" y="125" class="lbl" text-anchor="start" font-size="11">วางอะตอมกลาง + โครงร่าง</text>
  <text x="240" y="142" class="sub" text-anchor="start">C เป็นอะตอมกลาง (EN ต่ำสุด) ล้อมด้วย O ทั้ง 3 ตัว</text>

  <line x1="30" y1="160" x2="710" y2="160" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ขั้น 3 -->
  <circle cx="70" cy="190" r="16" fill="#0d9488"/>
  <text x="70" y="195" class="step">3</text>
  <text x="240" y="185" class="lbl" text-anchor="start" font-size="11">พันธะเดี่ยวเชื่อมทุกอะตอม</text>
  <text x="240" y="202" class="sub" text-anchor="start">C−O ทั้ง 3 พันธะ ใช้ไป 3×2 = 6 อิเล็กตรอน (เหลือ 18)</text>

  <line x1="30" y1="220" x2="710" y2="220" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ขั้น 4 -->
  <circle cx="70" cy="250" r="16" fill="#0d9488"/>
  <text x="70" y="255" class="step">4</text>
  <text x="240" y="245" class="lbl" text-anchor="start" font-size="11">เติมอิเล็กตรอนคู่โดดเดี่ยวให้ครบออกเตต</text>
  <text x="240" y="262" class="sub" text-anchor="start">แจก 18 อิเล็กตรอนให้ O แต่ละตัวครบ 8 ก่อน (O แต่ละตัวได้ 3 คู่โดดเดี่ยว)</text>

  <line x1="30" y1="280" x2="710" y2="280" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ขั้น 5 -->
  <circle cx="70" cy="310" r="16" fill="#0d9488"/>
  <text x="70" y="315" class="step">5</text>
  <text x="240" y="305" class="lbl" text-anchor="start" font-size="11">ตรวจอะตอมกลางให้ครบออกเตต</text>
  <text x="240" y="322" class="sub" text-anchor="start">C มีแค่ 6 อิเล็กตรอน (3 พันธะเดี่ยว) → ยังไม่ครบ 8</text>
  <text x="240" y="339" class="sub" text-anchor="start">ต้องเปลี่ยน 1 พันธะ C−O เป็นพันธะคู่ C=O เพื่อให้ C ครบออกเตต</text>

  <rect x="500" y="290" width="200" height="70" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="600" y="315" class="lbl" fill="#0d9488" font-size="12">ผลลัพธ์: C=O 1 พันธะ</text>
  <text x="600" y="333" class="sub">C−O 2 พันธะ (เกิด resonance</text>
  <text x="600" y="348" class="sub">ให้ผลเทียบเท่ากันทั้ง 3 แบบ)</text>
</svg>
